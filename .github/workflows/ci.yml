name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc (convert path / doctor)
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --locked
        run: cargo test --locked --all-targets

      - name: CLI smoke (release help + doctor)
        run: |
          cargo build --locked --release --bin canonic
          ./target/release/canonic --help
          ./target/release/canonic doctor

      - name: Corpus quality gate (published responses)
        run: |
          set -euo pipefail
          ./target/release/canonic list
          ./target/release/canonic check
          # In-process harper-core only (Vale may be absent on the runner).
          ./target/release/canonic lint --engine harper
          # Convert/render smoke: non-empty jira body from the seeded sample.
          sample=corpus/responses/resp-project-space-is-not-a-backup.md
          test -f "$sample"
          out=$(./target/release/canonic convert "$sample")
          test -n "$out"
          echo "$out" | head -n 5
