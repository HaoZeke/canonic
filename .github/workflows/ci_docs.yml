name: Build and Deploy Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc + emacs (org → RST export, doctor examples)
        run: sudo apt-get update && sudo apt-get install -y pandoc emacs-nox

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # cache sphinx-rustdocgen install as well as the crate
          cache-targets: true

      - name: Install sphinx-rustdocgen
        run: cargo install sphinx-rustdocgen --locked

      - name: Build Sphinx site (Shibuya + embedded Rust API)
        run: ./docs/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/build

      - name: Ensure Cloudflare Pages project exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages project create canonic --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Prefer plain npx --yes; wrangler-action can fail non-interactively on package install.
        run: npx --yes wrangler@3 pages deploy docs/build --project-name=canonic --branch=main
